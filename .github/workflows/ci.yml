name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "codex/**"
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: pip install -r orchestrator/requirements.txt

      - name: Run orchestrator tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

  dotnet-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore workers/csharp_worker/NexusMesh.Worker.csproj

      - name: Build
        run: dotnet build workers/csharp_worker/NexusMesh.Worker.csproj --configuration Release --no-restore
